name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, Test & Publish (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript → dist/)
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify declaration files are emitted
        run: |
          missing=0
          for f in \
            dist/index.d.ts \
            dist/runtime/SSMRuntime.d.ts \
            dist/bridges/TransformerBridge.d.ts \
            dist/bridges/OpenAIBridge.d.ts \
            dist/bridges/AnthropicBridge.d.ts \
            dist/router/InferenceRouter.d.ts \
            dist/memory/MemoryStore.d.ts \
            dist/distillation/DistillationEngine.d.ts \
            dist/agent/SSMAgent.d.ts \
            dist/errors/SSMError.d.ts; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found after build"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then exit 1; fi
          echo "✓ All TypeScript declaration files present"

  publish:
    name: Publish to npm & Create GitHub Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: npm run build

      - name: Stamp version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Determine dist-tag
        id: dist_tag
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
